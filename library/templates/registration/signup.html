{% extends 'base.html' %}

{% block content %}
<h2>Registration</h2>

<form method="POST">
    {% csrf_token %}

    {% for field in form %}
        <div class="field-wrapper">
            <label for="{{ field.id_for_label }}">{{ field.label }}</label><br>
            {{ field }}
            {% if field.errors %}
                <div style="color: red; font-size: 0.8em;">
                    {% for error in field.errors %}
                        {{ error }}
                    {% endfor %}
                </div>
            {% endif %}
            <br>
        </div>
    {% endfor %}

    <button type="submit">Sign Up</button>
</form>
{% endblock %}
