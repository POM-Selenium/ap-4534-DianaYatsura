{% extends 'base.html' %}
{% block content %}
<h2>Login</h2>

{% if messages %}
    {% for message in messages %}
        <p style="color: red;">{{ message }}</p>
    {% endfor %}
{% endif %}

<form method="POST">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit">Enter</button>
</form>

<p>Don't have an account? <a href="{% url 'user:register' %}">Sign up here</a>.</p>
{% endblock %}
