{% extends "base.html" %}
{% block title %}Edit Order{% endblock %}

{% block content %}
<h2>Edit Order</h2>

<form method="post">
    {% csrf_token %}

    {% for field in form %}
        <div class="mb-3">
            <label class="form-label">{{ field.label }}</label>
            {{ field }}

            {% if field.errors %}
                {% for error in field.errors %}
                    <div class="text-danger">{{ error }}</div>
                {% endfor %}
            {% endif %}
        </div>
    {% endfor %}

    <button type="submit" class="btn btn-success">Save</button>
</form>

<p><a href="{% url 'order:detail' order.pk %}">Back to order</a></p>
{% endblock %}
