{% extends "base.html" %}

{% block title %}Create Book{% endblock %}

{% block content %}
<h2>Create Book</h2>

<form method="post">
    {% csrf_token %}

    {% for field in form %}
        <div class="mb-3">
            <label class="form-label">{{ field.label }}</label>
            {{ field }}

            {% if field.errors %}
                {% for error in field.errors %}
                    <div class="text-danger">{{ error }}</div>
                {% endfor %}
            {% endif %}
        </div>
    {% endfor %}

    <button type="submit" class="btn btn-success">Create</button>
</form>

<p><a href="{% url 'book:index' %}">← Back to books</a></p>
{% endblock %}
